<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:297mm; height:210mm; background:white; overflow:hidden; }
  @page { size:A4 landscape; margin:0; }
  svg { display:block; width:297mm; height:210mm; }
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1060 742"
     font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">

  <!-- ── DEFS ─────────────────────────────────────────────────────────── -->
  <defs>
    <marker id="ag"  viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,1.5 L9,5 L0,8.5Z" fill="#6B7E94"/></marker>
    <marker id="agr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,1.5 L9,5 L0,8.5Z" fill="#2E7D32"/></marker>
    <marker id="ar"  viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,1.5 L9,5 L0,8.5Z" fill="#B71C1C"/></marker>
    <marker id="ab"  viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,1.5 L9,5 L0,8.5Z" fill="#1565C0"/></marker>
    <marker id="ao"  viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,1.5 L9,5 L0,8.5Z" fill="#D84315"/></marker>
    <filter id="sh"  x="-6%" y="-6%" width="112%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#040E1A" flood-opacity="0.09"/>
    </filter>
    <filter id="sh2" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#040E1A" flood-opacity="0.07"/>
    </filter>
  </defs>

  <!-- ── BACKGROUND ───────────────────────────────────────────────────── -->
  <rect width="1060" height="742" fill="#ECF2F8"/>

  <!-- ── HEADER ───────────────────────────────────────────────────────── -->
  <rect x="0" y="0" width="1060" height="56" fill="#0B1929"/>
  <circle cx="30" cy="28" r="16" fill="rgba(255,255,255,0.10)"/>
  <text x="30"  y="33" fill="white"                 text-anchor="middle" font-size="10"   font-weight="800">HP</text>
  <text x="54"  y="21" fill="white"                 font-size="14" font-weight="700">HansePay</text>
  <text x="54"  y="41" fill="rgba(255,255,255,.48)" font-size="10.5">KYC Decision Flow — Company Onboarding (MECE)</text>
  <text x="1050" y="41" fill="rgba(255,255,255,.25)" font-size="8.5" text-anchor="end">Internal reference · not a legal document</text>

  <!-- ══════════════════════════════════════════════════════════════════
       CONNECTORS
  ══════════════════════════════════════════════════════════════════════ -->

  <!-- START → Q1 -->
  <line x1="530" y1="116" x2="530" y2="143"
        stroke="#6B7E94" stroke-width="2" marker-end="url(#ag)"/>

  <!-- Q1 YES (left) → Q2 -->
  <path d="M350,204 L296,204 L296,322"
        fill="none" stroke="#2E7D32" stroke-width="2" marker-end="url(#agr)"/>

  <!-- Q1 NO (right) → CASE A -->
  <path d="M710,204 L800,204 L800,278"
        fill="none" stroke="#B71C1C" stroke-width="2" marker-end="url(#ar)"/>

  <!-- Q2 YES (left) → Q3 -->
  <path d="M165,372 L165,460"
        fill="none" stroke="#2E7D32" stroke-width="2" marker-end="url(#agr)"/>

  <!-- Q2 NO (right) → CASE D -->
  <path d="M455,372 L548,372 L548,432"
        fill="none" stroke="#D84315" stroke-width="2" marker-end="url(#ao)"/>

  <!-- Q3 NO (left base) → CASE B -->
  <path d="M42,560 L42,610"
        fill="none" stroke="#2E7D32" stroke-width="2" marker-end="url(#agr)"/>

  <!-- Q3 YES (right base) → CASE C -->
  <path d="M288,560 L288,610"
        fill="none" stroke="#1565C0" stroke-width="2" marker-end="url(#ab)"/>


  <!-- ══════════════════════════════════════════════════════════════════
       YES / NO BADGES  — placed ON the connector arms, away from nodes
  ══════════════════════════════════════════════════════════════════════ -->

  <!-- Q1 YES — on horizontal arm going left -->
  <rect x="305" y="194" width="38" height="18" rx="5" fill="#2E7D32"/>
  <text x="324" y="207" fill="white" text-anchor="middle" font-size="9.5" font-weight="700">YES</text>

  <!-- Q1 NO — on horizontal arm going right -->
  <rect x="716" y="194" width="34" height="18" rx="5" fill="#B71C1C"/>
  <text x="733" y="207" fill="white" text-anchor="middle" font-size="9.5" font-weight="700">NO</text>

  <!-- Q2 YES — on vertical arm going down-left (just left of line) -->
  <rect x="126" y="352" width="38" height="18" rx="5" fill="#2E7D32"/>
  <text x="145" y="365" fill="white" text-anchor="middle" font-size="9.5" font-weight="700">YES</text>

  <!-- Q2 NO — on horizontal arm going right -->
  <rect x="459" y="356" width="34" height="18" rx="5" fill="#D84315"/>
  <text x="476" y="369" fill="white" text-anchor="middle" font-size="9.5" font-weight="700">NO</text>

  <!-- Q3 NO — left base, going down -->
  <rect x="13"  y="561" width="34" height="18" rx="5" fill="#2E7D32"/>
  <text x="30"  y="574" fill="white" text-anchor="middle" font-size="9.5" font-weight="700">NO</text>

  <!-- Q3 YES — right base, going down -->
  <rect x="292" y="561" width="38" height="18" rx="5" fill="#1565C0"/>
  <text x="311" y="574" fill="white" text-anchor="middle" font-size="9.5" font-weight="700">YES</text>


  <!-- ══════════════════════════════════════════════════════════════════
       DECISION NODES
  ══════════════════════════════════════════════════════════════════════ -->

  <!-- START -->
  <rect x="400" y="70" width="260" height="46" rx="23" fill="#0B1929" filter="url(#sh)"/>
  <text x="530" y="98" fill="white" text-anchor="middle" font-size="14" font-weight="700" letter-spacing=".2">KYB Onboarding</text>

  <!-- Q1 Diamond: center=(530,204)  hw=180  hh=61
       top(530,143) right(710,204) bottom(530,265) left(350,204) -->
  <polygon points="530,143 710,204 530,265 350,204" fill="#163659" filter="url(#sh)"/>
  <text x="530" y="197" fill="white" text-anchor="middle" font-size="12" font-weight="600">Any UBO? — does any individual</text>
  <text x="530" y="215" fill="white" text-anchor="middle" font-size="12" font-weight="600">own ≥25% of the company?</text>

  <!-- Q2 Diamond: center=(310,372)  hw=145  hh=50
       top(310,322) right(455,372) bottom(310,422) left(165,372) -->
  <polygon points="310,322 455,372 310,422 165,372" fill="#1E4E80" filter="url(#sh)"/>
  <text x="310" y="366" fill="white" text-anchor="middle" font-size="11" font-weight="600">Is the Director</text>
  <text x="310" y="382" fill="white" text-anchor="middle" font-size="11" font-weight="600">also a UBO (≥25%)?</text>

  <!-- Q3 Triangle: top=(165,460)  BL=(42,560)  BR=(288,560) -->
  <polygon points="165,460 288,560 42,560" fill="#1E4E80" filter="url(#sh)"/>
  <text x="165" y="512" fill="white" text-anchor="middle" font-size="10.5" font-weight="600">Other UBOs ≥25%</text>
  <text x="165" y="529" fill="white" text-anchor="middle" font-size="10.5" font-weight="600">besides Director?</text>


  <!-- ══════════════════════════════════════════════════════════════════
       CASE  CARDS
  ══════════════════════════════════════════════════════════════════════ -->

  <!-- ── CASE A — No UBO  ──────────────────────────────────────────────
       x=755  y=278  w=218  h=208 -->
  <rect x="755" y="278" width="218" height="208" rx="12"
        fill="white" stroke="#C62828" stroke-width="2" filter="url(#sh)"/>
  <rect x="765" y="289" width="198" height="26" rx="8" fill="#C62828"/>
  <text x="864" y="307" fill="white" text-anchor="middle" font-size="11.5" font-weight="700">CASE A — No UBO</text>
  <text x="864" y="334" fill="#0B1929" text-anchor="middle" font-size="11"   font-weight="600">No owner holds ≥25%</text>
  <text x="864" y="350" fill="#7A8FA6" text-anchor="middle" font-size="9.5">(e.g. 5 shareholders × 20%)</text>
  <line x1="768" y1="362" x2="964" y2="362" stroke="#E0EAF4" stroke-width="1"/>
  <text x="775" y="381" fill="#C62828"  font-size="16" font-weight="700">✗</text>
  <text x="798" y="381" fill="#222"     font-size="11" font-weight="500">UBO / Owner KYC</text>
  <text x="798" y="396" fill="#999"     font-size="9.5" font-style="italic">No qualifying UBO identified</text>
  <line x1="768" y1="408" x2="964" y2="408" stroke="#E0EAF4" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="775" y="428" fill="#2E7D32"  font-size="16" font-weight="700">✓</text>
  <text x="798" y="428" fill="#222"     font-size="11" font-weight="500">Director KYC</text>
  <text x="798" y="443" fill="#999"     font-size="9.5" font-style="italic">Always required</text>
  <text x="768" y="462" fill="#7A8FA6" font-size="9" font-style="italic">Senior manager identified as</text>
  <text x="768" y="475" fill="#7A8FA6" font-size="9" font-style="italic">controlling person where applicable.</text>

  <!-- ── CASE B — Director IS sole UBO  ───────────────────────────────
       x=8  y=610  w=200  h=122 -->
  <rect x="8" y="610" width="200" height="122" rx="12"
        fill="white" stroke="#2E7D32" stroke-width="2" filter="url(#sh)"/>
  <rect x="18" y="621" width="180" height="26" rx="8" fill="#2E7D32"/>
  <text x="108" y="639" fill="white" text-anchor="middle" font-size="11.5" font-weight="700">CASE B — 1 combined KYC</text>
  <text x="108" y="664" fill="#0B1929" text-anchor="middle" font-size="11"   font-weight="600">Director IS the sole UBO</text>
  <text x="108" y="679" fill="#7A8FA6" text-anchor="middle" font-size="9.5">Owns ≥25%, no other UBOs</text>
  <line x1="20" y1="690" x2="198" y2="690" stroke="#E0EAF4" stroke-width="1"/>
  <text x="28"  y="708" fill="#2E7D32" font-size="16" font-weight="700">✓</text>
  <text x="52"  y="708" fill="#222"    font-size="11" font-weight="500">Combined KYC × 1</text>
  <text x="52"  y="722" fill="#999"    font-size="9"  font-style="italic">Owner + Director — one process</text>

  <!-- ── CASE C — Director is UBO + other UBOs  ───────────────────────
       x=224  y=610  w=212  h=122 -->
  <rect x="224" y="610" width="212" height="122" rx="12"
        fill="white" stroke="#1565C0" stroke-width="2" filter="url(#sh)"/>
  <rect x="234" y="621" width="192" height="26" rx="8" fill="#1565C0"/>
  <text x="330" y="639" fill="white" text-anchor="middle" font-size="11.5" font-weight="700">CASE C — N combined KYC</text>
  <text x="330" y="664" fill="#0B1929" text-anchor="middle" font-size="11"   font-weight="600">Director IS a UBO + others ≥25%</text>
  <text x="330" y="679" fill="#7A8FA6" text-anchor="middle" font-size="9.5">Multiple owners, Director is one</text>
  <line x1="236" y1="690" x2="426" y2="690" stroke="#E0EAF4" stroke-width="1"/>
  <text x="244" y="708" fill="#2E7D32" font-size="16" font-weight="700">✓</text>
  <text x="268" y="708" fill="#222"    font-size="11" font-weight="500">KYC per UBO (incl. Director)</text>
  <text x="268" y="722" fill="#999"    font-size="9"  font-style="italic">N processes · Director's is combined</text>

  <!-- ── CASE D — Director ≠ UBO  ─────────────────────────────────────
       x=478  y=432  w=215  h=192 -->
  <rect x="478" y="432" width="215" height="192" rx="12"
        fill="white" stroke="#D84315" stroke-width="2" filter="url(#sh)"/>
  <rect x="488" y="443" width="195" height="26" rx="8" fill="#D84315"/>
  <text x="585" y="461" fill="white" text-anchor="middle" font-size="11.5" font-weight="700">CASE D — N+1 KYC</text>
  <text x="585" y="487" fill="#0B1929" text-anchor="middle" font-size="11"   font-weight="600">Director ≠ any UBO</text>
  <text x="585" y="503" fill="#7A8FA6" text-anchor="middle" font-size="9.5">Separate individuals</text>
  <line x1="490" y1="514" x2="684" y2="514" stroke="#E0EAF4" stroke-width="1"/>
  <text x="498" y="534" fill="#2E7D32" font-size="16" font-weight="700">✓</text>
  <text x="522" y="534" fill="#222"    font-size="11" font-weight="500">UBO KYC (each ≥25%)</text>
  <text x="522" y="549" fill="#999"    font-size="9.5" font-style="italic">N processes, one per UBO</text>
  <line x1="490" y1="561" x2="684" y2="561" stroke="#E0EAF4" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="498" y="581" fill="#2E7D32" font-size="16" font-weight="700">✓</text>
  <text x="522" y="581" fill="#222"    font-size="11" font-weight="500">Director KYC (separate)</text>
  <text x="522" y="596" fill="#999"    font-size="9.5" font-style="italic">Always required</text>
  <line x1="490" y1="608" x2="684" y2="608" stroke="#E0EAF4" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="490" y="619" fill="#7A8FA6" font-size="9">Applies whether 1 or multiple UBOs exist.</text>


  <!-- ══════════════════════════════════════════════════════════════════
       SUMMARY TABLE
  ══════════════════════════════════════════════════════════════════════ -->
  <rect x="720" y="500" width="330" height="232" rx="10"
        fill="rgba(255,255,255,0.82)" stroke="#C8D8E8" stroke-width="1" filter="url(#sh2)"/>
  <text x="885" y="518" fill="#0B1929" text-anchor="middle" font-size="10" font-weight="700" letter-spacing=".06em">SUMMARY</text>

  <!-- header row -->
  <rect x="722" y="524" width="326" height="20" fill="#EEF3F8"/>
  <text x="760" y="538" fill="#6B7E94" font-size="8.5" font-weight="700">CASE</text>
  <text x="885" y="538" fill="#6B7E94" text-anchor="middle" font-size="8.5" font-weight="700">SCENARIO</text>
  <text x="1044" y="538" fill="#6B7E94" text-anchor="end"    font-size="8.5" font-weight="700">KYC COUNT</text>
  <line x1="722" y1="544" x2="1048" y2="544" stroke="#DDE8F0" stroke-width="1"/>

  <!-- Row A -->
  <rect x="728" y="549" width="9" height="9" rx="2" fill="#C62828"/>
  <text x="744" y="557" fill="#333" font-size="9" font-weight="700">A</text>
  <text x="885" y="557" fill="#333" text-anchor="middle" font-size="9">No UBO ≥25%</text>
  <text x="1044" y="557" fill="#C62828" text-anchor="end" font-size="9" font-weight="700">1  (Director only)</text>
  <line x1="722" y1="563" x2="1048" y2="563" stroke="#EEF3F8" stroke-width="1"/>

  <!-- Row B -->
  <rect x="728" y="567" width="9" height="9" rx="2" fill="#2E7D32"/>
  <text x="744" y="575" fill="#333" font-size="9" font-weight="700">B</text>
  <text x="885" y="575" fill="#333" text-anchor="middle" font-size="9">Director = sole UBO</text>
  <text x="1044" y="575" fill="#2E7D32" text-anchor="end" font-size="9" font-weight="700">1  (combined)</text>
  <line x1="722" y1="581" x2="1048" y2="581" stroke="#EEF3F8" stroke-width="1"/>

  <!-- Row C -->
  <rect x="728" y="585" width="9" height="9" rx="2" fill="#1565C0"/>
  <text x="744" y="593" fill="#333" font-size="9" font-weight="700">C</text>
  <text x="885" y="593" fill="#333" text-anchor="middle" font-size="9">Director is UBO + other UBOs exist</text>
  <text x="1044" y="593" fill="#1565C0" text-anchor="end" font-size="9" font-weight="700">N  (one per UBO)</text>
  <line x1="722" y1="599" x2="1048" y2="599" stroke="#EEF3F8" stroke-width="1"/>

  <!-- Row D -->
  <rect x="728" y="603" width="9" height="9" rx="2" fill="#D84315"/>
  <text x="744" y="611" fill="#333" font-size="9" font-weight="700">D</text>
  <text x="885" y="611" fill="#333" text-anchor="middle" font-size="9">Director ≠ UBO(s)</text>
  <text x="1044" y="611" fill="#D84315" text-anchor="end" font-size="9" font-weight="700">N+1  (UBOs + Director)</text>
  <line x1="722" y1="618" x2="1048" y2="618" stroke="#DDE8F0" stroke-width="1"/>

  <!-- Key / notes -->
  <text x="730" y="632" fill="#7A8FA6" font-size="8.5" font-weight="600">Key:</text>
  <text x="730" y="645" fill="#7A8FA6" font-size="8.5">UBO = beneficial owner who holds ≥25% of shares or voting rights.</text>
  <text x="730" y="658" fill="#7A8FA6" font-size="8.5">N = number of qualifying UBOs.  Director = authorised signatory / MD.</text>
  <text x="730" y="671" fill="#7A8FA6" font-size="8.5">Every KYC requires: valid ID · proof of address · source of wealth/funds.</text>
  <text x="730" y="684" fill="#7A8FA6" font-size="8.5">If UBO = Director, only ONE KYC process is needed for that individual.</text>
  <text x="730" y="700" fill="#7A8FA6" font-size="8" font-style="italic">This chart is for onboarding reference only. Final KYC scope determined by Compliance.</text>
  <text x="730" y="713" fill="#7A8FA6" font-size="8" font-style="italic">HansePay is a trading name of Atrya Technologies SIA, regulated by Latvijas Banka.</text>

</svg>
</body>
</html>
