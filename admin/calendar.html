<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" sizes="32x32" href="/hansepay/assets/favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/hansepay/assets/favicon-180.png">

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Calendar — HansePay Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root{
  --n900:#060D1A;--n800:#0B1929;--n700:#0F2540;--n600:#163659;
  --n500:#1E4E80;--n400:#2E6BAD;--n300:#3B7BC4;--n200:#8DBDE6;
  --n100:#C4DDEF;--n050:#EBF4FB;--off:#F5F1EA;--gold:#C9A961;
  --ink:#0B1929;--ink2:#3D5A73;--ink3:#7A9AB0;
  --r-sm:6px;--r-md:10px;--r-lg:16px;--r-pill:100px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--off);color:var(--ink);display:flex;min-height:100vh;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}

/* SIDEBAR (matches other admin pages) */
.sidebar{width:240px;min-height:100vh;background:var(--n800);display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;bottom:0;z-index:100;overflow-y:auto}
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:28px 20px 22px;border-bottom:1px solid rgba(255,255,255,.07)}
.sidebar-brand{font-family:'Playfair Display',serif;font-size:1.25rem;font-weight:700;color:#fff;letter-spacing:-.01em;line-height:1}
.sidebar-admin-badge{font-size:.625rem;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:rgba(255,255,255,.35);display:block;margin-top:4px}
.sidebar-nav{flex:1;padding:18px 12px;overflow-y:auto}
.nav-section{font-size:.6875rem;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:rgba(255,255,255,.22);padding:12px 12px 6px;margin-top:4px;display:block}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--r-md);font-size:.8125rem;font-weight:500;color:rgba(255,255,255,.55);transition:all .15s;margin-bottom:2px;border-left:3px solid transparent}
.nav-item:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85)}
.nav-item.active{background:var(--n600);color:#fff;font-weight:600;border-left-color:var(--gold)}
.nav-item svg{width:16px;height:16px;flex-shrink:0}
.sidebar-footer{padding:16px 12px;border-top:1px solid rgba(255,255,255,.07)}
.sidebar-user{display:flex;align-items:center;gap:10px;padding:8px 10px;margin-bottom:8px}
.sidebar-avatar{width:30px;height:30px;border-radius:50%;background:var(--n500);display:flex;align-items:center;justify-content:center;font-size:.6875rem;font-weight:700;color:#fff;flex-shrink:0}
.sidebar-user-info{overflow:hidden}
.sidebar-user-name{font-size:.75rem;font-weight:500;color:rgba(255,255,255,.75);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-user-email{font-size:.6875rem;color:rgba(255,255,255,.35);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.signout-link{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--r-md);font-size:.75rem;font-weight:500;color:rgba(255,255,255,.45);cursor:pointer;transition:all .15s;background:none;border:none;font-family:'Inter',sans-serif;width:100%;text-align:left}
.signout-link:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.75)}
.signout-link svg,.nav-item svg{width:14px;height:14px}
.nav-item svg{width:16px;height:16px}

/* MAIN */
.main{flex:1;margin-left:240px;min-height:100vh;display:flex;flex-direction:column}
.topbar{background:#fff;border-bottom:1px solid rgba(11,25,41,.08);padding:0 28px;height:64px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:16px}
.page-title{font-family:'Playfair Display',serif;font-size:1.375rem;font-weight:600;color:var(--n800)}
.topbar-right{display:flex;align-items:center;gap:10px}
.content{padding:24px 28px;flex:1;display:flex;gap:20px;align-items:flex-start}

/* CALENDAR MAIN AREA */
.cal-main{flex:1;min-width:0}
.cal-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.cal-nav-group{display:flex;align-items:center;gap:8px}
.cal-arrow{background:#fff;border:1.5px solid rgba(11,25,41,.12);border-radius:var(--r-pill);width:34px;height:34px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink2);font-size:16px;transition:.15s}
.cal-arrow:hover{background:var(--n050);border-color:var(--n200)}
.cal-title{font-size:1.1rem;font-weight:700;color:var(--n800);min-width:180px;text-align:center}
.cal-today-btn{padding:7px 16px;border-radius:var(--r-pill);border:1.5px solid rgba(11,25,41,.12);background:#fff;font-family:'Inter',sans-serif;font-size:.8125rem;font-weight:600;color:var(--ink2);cursor:pointer;transition:.15s}
.cal-today-btn:hover{background:var(--n050)}
.view-tabs{display:flex;border:1.5px solid rgba(11,25,41,.12);border-radius:var(--r-pill);overflow:hidden;background:#fff}
.view-tab{padding:7px 18px;font-size:.8125rem;font-weight:600;color:var(--ink3);cursor:pointer;border:none;background:transparent;font-family:'Inter',sans-serif;transition:.15s}
.view-tab.active{background:var(--n500);color:#fff}

/* WEEK VIEW */
.week-grid{background:#fff;border-radius:var(--r-lg);border:1px solid rgba(11,25,41,.08);box-shadow:0 1px 4px rgba(11,25,41,.04);overflow:hidden}
.week-header{display:grid;grid-template-columns:56px repeat(7,1fr);border-bottom:1px solid rgba(11,25,41,.07)}
.week-header-empty{background:#fafbfc;border-right:1px solid rgba(11,25,41,.06)}
.week-day-col{text-align:center;padding:12px 8px;background:#fafbfc;border-right:1px solid rgba(11,25,41,.06)}
.week-day-col:last-child{border-right:none}
.week-day-name{font-size:.6875rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3)}
.week-day-num{font-size:1.1rem;font-weight:700;color:var(--n700);margin-top:2px}
.week-day-col.today .week-day-num{color:var(--n500)}
.week-day-col.today{background:var(--n050)}

.week-body{display:grid;grid-template-columns:56px repeat(7,1fr);max-height:580px;overflow-y:auto}
.time-col{background:#fafbfc;border-right:1px solid rgba(11,25,41,.06)}
.time-slot{height:48px;display:flex;align-items:flex-start;justify-content:flex-end;padding:4px 8px 0 0;font-size:.6875rem;color:var(--ink3);font-weight:500;border-bottom:1px solid rgba(11,25,41,.04)}
.day-col{border-right:1px solid rgba(11,25,41,.05);position:relative}
.day-col:last-child{border-right:none}
.day-slot{height:48px;border-bottom:1px solid rgba(11,25,41,.04)}
.booking-event{position:absolute;left:3px;right:3px;border-radius:6px;padding:4px 7px;font-size:11.5px;font-weight:600;cursor:pointer;transition:.12s;overflow:hidden;z-index:2;line-height:1.3}
.booking-event:hover{filter:brightness(1.08);box-shadow:0 3px 10px rgba(0,0,0,.18)}
.booking-event-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff;font-size:12px}
.booking-event-time{color:rgba(255,255,255,.75);font-size:10.5px;font-weight:500}
.booking-event-rebook{font-size:10px;color:rgba(255,255,255,.85);margin-top:1px}

/* MONTH VIEW */
.month-grid{background:#fff;border-radius:var(--r-lg);border:1px solid rgba(11,25,41,.08);box-shadow:0 1px 4px rgba(11,25,41,.04);overflow:hidden}
.month-header{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid rgba(11,25,41,.07);background:#fafbfc}
.month-day-hdr{padding:10px 0;text-align:center;font-size:.6875rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3)}
.month-body{display:grid;grid-template-columns:repeat(7,1fr)}
.month-cell{border-right:1px solid rgba(11,25,41,.05);border-bottom:1px solid rgba(11,25,41,.05);min-height:100px;padding:8px 10px;cursor:pointer;transition:.12s}
.month-cell:hover{background:var(--n050)}
.month-cell.other-month .month-cell-num{color:#ccd4dc}
.month-cell.today{background:var(--n050)}
.month-cell.today .month-cell-num{color:var(--n500);font-weight:700}
.month-cell-num{font-size:.875rem;font-weight:600;color:var(--n700);margin-bottom:6px}
.month-dot-row{display:flex;flex-wrap:wrap;gap:3px}
.month-dot{width:8px;height:8px;border-radius:50%}
.month-more{font-size:11px;color:var(--ink3);margin-top:3px}

/* SIDE PANEL — Booking detail + Rep management */
.side-panel{width:300px;flex-shrink:0}
.panel-card{background:#fff;border-radius:var(--r-lg);border:1px solid rgba(11,25,41,.08);box-shadow:0 1px 4px rgba(11,25,41,.04);margin-bottom:16px;overflow:hidden}
.panel-head{padding:16px 18px;border-bottom:1px solid rgba(11,25,41,.06);font-size:.875rem;font-weight:700;color:var(--n800);display:flex;align-items:center;justify-content:space-between}
.panel-body{padding:16px 18px}
.panel-close{background:none;border:none;cursor:pointer;color:var(--ink3);font-size:18px;line-height:1}
.panel-close:hover{color:var(--ink)}
.detail-row{display:flex;flex-direction:column;margin-bottom:12px}
.detail-label{font-size:.6875rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--ink3);margin-bottom:3px}
.detail-value{font-size:.875rem;color:var(--ink);font-weight:500}
.badge{display:inline-flex;padding:3px 9px;border-radius:var(--r-pill);font-size:.6875rem;font-weight:600}
.badge-new{background:#dbeafe;color:#1d4ed8}
.badge-contacted{background:#fef9c3;color:#854d0e}
.badge-qualified{background:#ede9fe;color:#6d28d9}
.badge-won{background:#dcfce7;color:#166534}
.badge-lost{background:#fee2e2;color:#991b1b}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r-pill);border:none;font-family:'Inter',sans-serif;font-size:.8125rem;font-weight:600;cursor:pointer;transition:all .15s}
.btn-sm{padding:6px 12px;font-size:.75rem}
.btn-primary{background:var(--n500);color:#fff}
.btn-primary:hover{background:var(--n600)}
.btn-ghost{background:transparent;color:var(--ink2);border:1.5px solid rgba(11,25,41,.12)}
.btn-ghost:hover{background:var(--n050)}

/* REP LIST */
.rep-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(11,25,41,.05)}
.rep-item:last-child{border-bottom:none}
.rep-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.rep-name{font-size:.875rem;font-weight:600;color:var(--ink);flex:1}
.rep-priority{font-size:.75rem;color:var(--ink3)}
.rep-count{font-size:.8125rem;font-weight:700;color:var(--n500)}
.empty-panel{text-align:center;color:var(--ink3);padding:24px 12px;font-size:.875rem}

/* ASSIGN SELECT */
.assign-select{width:100%;padding:8px 12px;border:1.5px solid rgba(11,25,41,.12);border-radius:var(--r-md);font-family:'Inter',sans-serif;font-size:.8125rem;color:var(--ink);background:#fff;cursor:pointer;outline:none;margin-top:8px}
.assign-select:focus{border-color:var(--n400)}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--n800);color:#fff;padding:12px 22px;border-radius:var(--r-pill);font-size:.8125rem;font-weight:500;opacity:0;pointer-events:none;transition:all .25s;z-index:9999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="hp-sidebar"></div>

<!-- MAIN -->
<main class="main">
  <div class="topbar">
    <div class="page-title">Calendar</div>
    <div class="topbar-right">
      <div class="view-tabs">
        <button class="view-tab active" id="tabWeek" onclick="setView('week')">Week</button>
        <button class="view-tab" id="tabMonth" onclick="setView('month')">Month</button>
      </div>
      <div class="sidebar-avatar" id="topbarAvatar" style="width:28px;height:28px;font-size:.6875rem">A</div>
    </div>
  </div>

  <div class="content">

    <!-- Calendar column -->
    <div class="cal-main">
      <div class="cal-toolbar">
        <div class="cal-nav-group">
          <button class="cal-arrow" onclick="shift(-1)">‹</button>
          <div class="cal-title" id="calTitle">Loading…</div>
          <button class="cal-arrow" onclick="shift(1)">›</button>
        </div>
        <button class="cal-today-btn" onclick="goToday()">Today</button>
      </div>

      <!-- Week view -->
      <div id="weekView">
        <div class="week-grid">
          <div class="week-header" id="weekHeader"></div>
          <div class="week-body" id="weekBody"></div>
        </div>
      </div>

      <!-- Month view -->
      <div id="monthView" style="display:none">
        <div class="month-grid">
          <div class="month-header" id="monthHeader"></div>
          <div class="month-body" id="monthBody"></div>
        </div>
      </div>
    </div>

    <!-- Side panel -->
    <div class="side-panel">
      <!-- Booking detail -->
      <div class="panel-card" id="detailPanel" style="display:none">
        <div class="panel-head">
          <span>Booking</span>
          <button class="panel-close" onclick="closeDetail()">×</button>
        </div>
        <div class="panel-body" id="detailBody"></div>
      </div>

      <!-- Rep roster -->
      <div class="panel-card">
        <div class="panel-head">Sales reps</div>
        <div class="panel-body" id="repList">
          <div class="empty-panel">Loading…</div>
        </div>
      </div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script src="components.js"></script>
<script>
var H=window.HPAdmin; H.renderSidebar('calendar');
var token = localStorage.getItem('hp_token');
if (!token) window.location.href = '/hansepay/admin/login.html';
var user = JSON.parse(localStorage.getItem('hp_user') || 'null');
if (user && user.role === 'compliance') { window.location.href = '/hansepay/admin/legal.html'; }
var API = 'https://hansepay-deploy-production-328c.up.railway.app';

// Init user display
if (user && user.name) {
  var ini = user.name.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
  document.getElementById('sidebarAvatar').textContent = ini;
  document.getElementById('topbarAvatar').textContent = ini;
  document.getElementById('sidebarName').textContent = user.name;
  document.getElementById('sidebarEmail').textContent = user.email || '';
}

function authFetch(url, opts) {
  opts = opts || {};
  opts.headers = Object.assign({'Authorization':'Bearer '+token,'Content-Type':'application/json'}, opts.headers||{});
  return fetch(API + url, opts).then(r=>{ if(r.status===401){window.HPAdmin.signOut();} return r; });
}
function showToast(msg,type){ var t=document.getElementById('toast'); t.textContent=msg; t.className='toast show'+(type?' '+type:''); setTimeout(()=>t.className='toast',2800); }

// ── State ─────────────────────────────────────────────────────────────────────
var VIEW = 'week';
var viewDate = new Date(); // anchor date for current week/month
var allBookings = [];
var salesReps = [];
var selectedBooking = null;

var DAYS_SHORT = ['Su','Mo','Tu','We','Th','Fr','Sa'];
var DAYS_LONG  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

var HOURS_START = 9, HOURS_END = 17; // 09:00 – 17:00
var SLOT_MIN = 30;

// ── Data loading ──────────────────────────────────────────────────────────────
function loadData() {
  // Load reps from settings
  authFetch('/api/settings').then(r=>r.json()).then(s=>{
    salesReps = Array.isArray(s.salesReps) ? s.salesReps : [];
    renderRepList();
  }).catch(()=>{});

  // Load bookings for current view range
  var range = getViewRange();
  authFetch('/api/bookings/calendar?start='+range.start+'&end='+range.end)
    .then(r=>r.json()).then(data=>{ allBookings=Array.isArray(data)?data:[]; renderView(); }).catch(()=>{});
}

function getViewRange() {
  if (VIEW === 'week') {
    var mon = getMonday(viewDate);
    var sun = new Date(mon); sun.setDate(sun.getDate()+6);
    return { start: mon.toISOString(), end: new Date(sun.getTime()+86400000-1).toISOString() };
  } else {
    var first = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1);
    var last  = new Date(viewDate.getFullYear(), viewDate.getMonth()+1, 0);
    return { start: first.toISOString(), end: new Date(last.getTime()+86400000-1).toISOString() };
  }
}

function getMonday(d) {
  var dt = new Date(d); var day = dt.getDay();
  var diff = dt.getDate() - day + (day===0?-6:1); // Mon = 0 offset
  dt.setDate(diff); dt.setHours(0,0,0,0); return dt;
}

// ── View control ──────────────────────────────────────────────────────────────
function setView(v) {
  VIEW = v;
  document.getElementById('tabWeek').classList.toggle('active', v==='week');
  document.getElementById('tabMonth').classList.toggle('active', v==='month');
  document.getElementById('weekView').style.display = v==='week'?'':'none';
  document.getElementById('monthView').style.display = v==='month'?'':'none';
  loadData();
}

function shift(delta) {
  if (VIEW==='week') viewDate.setDate(viewDate.getDate() + delta*7);
  else viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth()+delta, 1);
  loadData();
}

function goToday() { viewDate = new Date(); loadData(); }

// ── Render ────────────────────────────────────────────────────────────────────
function renderView() {
  if (VIEW==='week') renderWeek();
  else renderMonth();
}

function renderWeek() {
  var mon = getMonday(viewDate);
  var days = [];
  for(var i=0;i<7;i++){ var d=new Date(mon); d.setDate(d.getDate()+i); days.push(d); }

  var now = new Date(); now.setHours(0,0,0,0);
  document.getElementById('calTitle').textContent =
    days[0].toLocaleDateString('en-GB',{month:'short',day:'numeric'}) + ' – ' +
    days[6].toLocaleDateString('en-GB',{month:'short',day:'numeric',year:'numeric'});

  // Header
  var hdr = '<div class="week-header-empty"></div>';
  days.forEach(d=>{
    var isToday = d.getTime()===now.getTime();
    hdr += '<div class="week-day-col'+(isToday?' today':'')+'">'+
      '<div class="week-day-name">'+DAYS_SHORT[d.getDay()]+'</div>'+
      '<div class="week-day-num">'+d.getDate()+'</div>'+
    '</div>';
  });
  document.getElementById('weekHeader').innerHTML = hdr;

  // Body: time labels + day columns with events
  var slots = [];
  for(var h=HOURS_START;h<HOURS_END;h++) { slots.push(h+':00'); slots.push(h+':30'); }

  // Build time label column
  var timeCol = '';
  slots.forEach(s=>{ timeCol += '<div class="time-slot">'+s+'</div>'; });

  // Build each day column with positioned events
  var dayCols = days.map(d=>{
    var iso = d.toISOString().split('T')[0];
    var dayBookings = allBookings.filter(b=>b.slot&&b.slot.startISO&&b.slot.startISO.startsWith(iso));
    var slotsHtml = '';
    slots.forEach(()=>{ slotsHtml += '<div class="day-slot"></div>'; });

    var events = dayBookings.map(b=>{
      var start = new Date(b.slot.startISO);
      var end   = new Date(b.slot.endISO || new Date(start.getTime()+1800000));
      var startH = start.getHours() + start.getMinutes()/60;
      var endH   = end.getHours()   + end.getMinutes()/60;
      if(startH < HOURS_START || startH >= HOURS_END) return '';

      var top    = (startH - HOURS_START) * 96; // 2*48px per hour
      var height = Math.max((endH - startH) * 96, 36);
      var color  = b.assignedTo ? b.assignedTo.color : '#1E4E80';
      var name   = (b.lead.firstName||'') + ' ' + (b.lead.lastName||'');
      var time   = start.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/Berlin'});

      return '<div class="booking-event" style="top:'+top+'px;height:'+height+'px;background:'+color+'" onclick="openDetail(\''+b.id+'\')">'+
        '<div class="booking-event-name">'+escHtml(name.trim()||b.lead.email||'—')+'</div>'+
        '<div class="booking-event-time">'+time+(b.lead.company?' · '+escHtml(b.lead.company):'')+'</div>'+
        (b.rebooked?'<div class="booking-event-rebook">↔ Rescheduled</div>':'')+
      '</div>';
    }).join('');

    return '<div class="day-col" style="position:relative">'+slotsHtml+events+'</div>';
  });

  document.getElementById('weekBody').innerHTML = '<div class="time-col">'+timeCol+'</div>' + dayCols.join('');
}

function renderMonth() {
  var yr = viewDate.getFullYear(), mo = viewDate.getMonth();
  document.getElementById('calTitle').textContent = MONTHS[mo] + ' ' + yr;

  // Header
  var hdr = ['Mo','Tu','We','Th','Fr','Sa','Su'].map(d=>'<div class="month-day-hdr">'+d+'</div>').join('');
  document.getElementById('monthHeader').innerHTML = hdr;

  var first = new Date(yr, mo, 1);
  var startDow = (first.getDay()+6)%7; // Mon=0
  var daysInMonth = new Date(yr, mo+1, 0).getDate();
  var prevDays = new Date(yr, mo, 0).getDate();
  var today = new Date(); today.setHours(0,0,0,0);

  var cells = '';
  // Prev month overflow
  for(var i=startDow-1;i>=0;i--) {
    cells += '<div class="month-cell other-month"><div class="month-cell-num">'+(prevDays-i)+'</div></div>';
  }
  // Current month
  for(var d=1;d<=daysInMonth;d++) {
    var dt = new Date(yr,mo,d); var iso = dt.toISOString().split('T')[0];
    var dayBookings = allBookings.filter(b=>b.slot&&b.slot.startISO&&b.slot.startISO.startsWith(iso));
    var isToday = dt.getTime()===today.getTime();
    var dots = dayBookings.slice(0,6).map(b=>{
      var c = b.assignedTo ? b.assignedTo.color : '#1E4E80';
      return '<div class="month-dot" style="background:'+c+'"></div>';
    }).join('');
    var more = dayBookings.length>6 ? '<div class="month-more">+' + (dayBookings.length-6) + '</div>' : '';
    cells += '<div class="month-cell'+(isToday?' today':'') + '" onclick="switchToDay(\''+iso+'\')">' +
      '<div class="month-cell-num">'+d+'</div>' +
      '<div class="month-dot-row">'+dots+'</div>'+more+
    '</div>';
  }
  // Next month overflow to complete grid
  var total = startDow + daysInMonth;
  var rem   = total%7 === 0 ? 0 : 7-(total%7);
  for(var n=1;n<=rem;n++) cells += '<div class="month-cell other-month"><div class="month-cell-num">'+n+'</div></div>';

  document.getElementById('monthBody').innerHTML = cells;
}

function switchToDay(iso) {
  viewDate = new Date(iso+'T12:00:00Z');
  setView('week');
}

// ── Rep list ──────────────────────────────────────────────────────────────────
function renderRepList() {
  var el = document.getElementById('repList');
  if (!salesReps.length) { el.innerHTML='<div class="empty-panel">No reps configured.<br><small>Add reps in Admin → Settings.</small></div>'; return; }
  var byRep = {};
  allBookings.forEach(b=>{ var id = b.assignedTo ? b.assignedTo.id : 'unassigned'; byRep[id] = (byRep[id]||0)+1; });

  el.innerHTML = salesReps.sort((a,b)=>(a.priority||99)-(b.priority||99)).map(r=>{
    var count = byRep[r.id] || 0;
    return '<div class="rep-item">'+
      '<div class="rep-dot" style="background:'+(r.color||'#1E4E80')+'"></div>'+
      '<div class="rep-name">'+escHtml(r.name)+'<div class="rep-priority">Priority '+r.priority+'</div></div>'+
      '<div class="rep-count">'+count+'</div>'+
    '</div>';
  }).join('');
}

// ── Booking detail ────────────────────────────────────────────────────────────
function openDetail(id) {
  var b = allBookings.find(b=>b.id===id);
  if(!b) return;
  selectedBooking = b;

  var statusClass = 'badge-'+(b.status||'new');
  var name = ((b.lead.firstName||'')+' '+(b.lead.lastName||'')).trim();
  var startDate = new Date(b.slot.startISO).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric',timeZone:'Europe/Berlin'});
  var startTime = new Date(b.slot.startISO).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/Berlin'});

  var assignedOptions = '<option value="">Unassigned</option>' +
    salesReps.map(r=>'<option value="'+r.id+'" '+(b.assignedTo&&b.assignedTo.id===r.id?'selected':'')+'>' + escHtml(r.name) + '</option>').join('');

  document.getElementById('detailBody').innerHTML =
    '<div class="detail-row"><div class="detail-label">Contact</div><div class="detail-value">'+escHtml(name||'—')+'</div></div>'+
    '<div class="detail-row"><div class="detail-label">Company</div><div class="detail-value">'+escHtml(b.lead.company||'—')+'</div></div>'+
    '<div class="detail-row"><div class="detail-label">Email</div><div class="detail-value" style="font-size:.8125rem"><a href="mailto:'+escHtml(b.lead.email||'')+'" style="color:var(--n500)">'+escHtml(b.lead.email||'—')+'</a></div></div>'+
    '<div class="detail-row"><div class="detail-label">Time</div><div class="detail-value">'+escHtml(startDate+' · '+startTime)+'</div></div>'+
    '<div class="detail-row"><div class="detail-label">Status</div><div class="detail-value"><span class="badge '+statusClass+'">'+escHtml(b.status||'new')+'</span>'+(b.rebooked?'&nbsp;<span class="badge" style="background:#e0e7ff;color:#3730a3">↔ Rescheduled</span>':'')+'</div></div>'+
    (b.lead.fxVolume?'<div class="detail-row"><div class="detail-label">FX Volume</div><div class="detail-value">'+escHtml(b.lead.fxVolume)+'</div></div>':'')+
    (b.meetLink?'<div class="detail-row"><a href="'+escHtml(b.meetLink)+'" target="_blank" style="color:var(--n500);font-size:.8125rem;font-weight:600">Join Google Meet →</a></div>':'')+
    '<div class="detail-row"><div class="detail-label">Assigned to</div>'+
    '<select class="assign-select" id="assignSelect" onchange="assignRep(\''+b.id+'\')">'+assignedOptions+'</select></div>'+
    (b.notes?'<div class="detail-row" style="margin-top:4px"><div class="detail-label">Notes</div><div class="detail-value" style="font-size:.8125rem;font-weight:400">'+escHtml(b.notes)+'</div></div>':'')+
    '<div style="margin-top:14px"><a href="/hansepay/admin/bookings.html" class="btn btn-ghost btn-sm">Open in Bookings →</a></div>';

  document.getElementById('detailPanel').style.display='';
}

function closeDetail() {
  document.getElementById('detailPanel').style.display='none';
  selectedBooking = null;
}

function assignRep(bookingId) {
  var repId = document.getElementById('assignSelect').value;
  var rep = repId ? salesReps.find(r=>r.id===repId) : null;
  var repPayload = rep ? { id: rep.id, name: rep.name, color: rep.color||'#1E4E80' } : null;

  authFetch('/api/bookings/'+bookingId+'/assign', { method:'PATCH', body:JSON.stringify({rep:repPayload}) })
    .then(r=>r.json()).then(()=>{
      showToast('Assigned to '+(rep?rep.name:'nobody'));
      // Update local copy
      var idx = allBookings.findIndex(b=>b.id===bookingId);
      if(idx!==-1) allBookings[idx].assignedTo = repPayload;
      renderView(); renderRepList();
    }).catch(()=>showToast('Failed to assign','error'));
}

function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Init ──────────────────────────────────────────────────────────────────────
authFetch('/api/auth/me').then(r=>r.json()).then(me=>{
  if(me&&me.name){
    var ini=me.name.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
    document.getElementById('sidebarAvatar').textContent=ini;
    document.getElementById('topbarAvatar').textContent=ini;
    document.getElementById('sidebarName').textContent=me.name;
    if(me.email) document.getElementById('sidebarEmail').textContent=me.email;
  }
}).catch(()=>{});

loadData();
</script>
</body>
</html>
