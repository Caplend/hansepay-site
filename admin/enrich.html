<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" sizes="32x32" href="/hansepay/assets/favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/hansepay/assets/favicon-180.png">

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Enrichment — HansePay Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="admin.css" />
<style>
  /* Criteria builder */
  .crit-bar{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:16px}
  .crit-chip{display:inline-flex;align-items:center;gap:7px;padding:6px 10px 6px 12px;border:1.5px solid rgba(11,25,41,.12);border-radius:var(--r-pill);background:#fff;font-size:.8125rem;font-weight:600;color:var(--ink2)}
  .crit-chip .ct{font-size:.625rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--n400);background:var(--n050);padding:2px 6px;border-radius:var(--r-pill)}
  .crit-chip .rm{cursor:pointer;border:none;background:none;color:var(--ink3);font-size:15px;line-height:1;padding:0 2px}
  .crit-chip .rm:hover{color:var(--bad)}
  .crit-add{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border:1.5px dashed rgba(30,78,128,.4);border-radius:var(--r-pill);background:#fff;color:var(--n500);font-family:'Inter',sans-serif;font-size:.8125rem;font-weight:600;cursor:pointer}
  .crit-add:hover{background:var(--n050)}
  .crit-empty{font-size:.8125rem;color:var(--ink3)}

  /* Run controls */
  .run-bar{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:16px;padding:14px 16px;background:#fafbfc;border:1px solid rgba(11,25,41,.08);border-radius:var(--r-lg)}
  .web-toggle{display:inline-flex;align-items:center;gap:8px;font-size:.8125rem;color:var(--ink2);cursor:pointer;user-select:none}
  .web-toggle input{width:15px;height:15px;accent-color:var(--n500)}
  .run-status{font-size:.8125rem;color:var(--ink2);font-variant-numeric:tabular-nums}

  /* Table */
  .enrich-table th{white-space:nowrap}
  .enrich-table th.sortable{cursor:pointer;user-select:none}
  .enrich-table th.sortable:hover{color:var(--n500)}
  .enrich-table th .arrow{font-size:.625rem;opacity:.6}
  .col-head{display:inline-flex;align-items:center;gap:5px}
  .enrich-dots{display:inline-block;color:var(--n400);letter-spacing:1px;animation:edots 1.1s ease-in-out infinite}
  @keyframes edots{0%,100%{opacity:.35}50%{opacity:1}}
  .cell-err{color:var(--bad);font-size:.6875rem}
  td.sel-col,th.sel-col{width:34px;text-align:center}
  .row-check{width:15px;height:15px;accent-color:var(--n500);cursor:pointer}

  /* Add-criterion modal */
  .modal-ov{display:none;position:fixed;inset:0;background:rgba(6,13,26,.5);z-index:700;align-items:center;justify-content:center;padding:20px}
  .modal-card{background:#fff;border-radius:18px;width:100%;max-width:560px;max-height:88vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(6,13,26,.25);overflow:hidden}
  .modal-head{background:linear-gradient(135deg,#060D1A,#163659);padding:20px 26px;display:flex;align-items:center;justify-content:space-between}
  .modal-head .t{font-family:'Playfair Display',serif;font-size:1.15rem;color:#fff}
  .modal-x{background:rgba(255,255,255,.12);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:18px}
  .modal-body{padding:22px 26px;overflow-y:auto}
  .sec-label{font-size:.6875rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--ink3);margin-bottom:10px}
  .preset-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:22px}
  .preset-btn{text-align:left;padding:10px 12px;border:1.5px solid rgba(11,25,41,.12);border-radius:var(--r-md);background:#fff;cursor:pointer;font-family:'Inter',sans-serif}
  .preset-btn:hover:not(:disabled){border-color:var(--n400);background:var(--n050)}
  .preset-btn:disabled{opacity:.45;cursor:default}
  .preset-btn .pl{font-size:.8125rem;font-weight:600;color:var(--ink)}
  .preset-btn .pp{font-size:.6875rem;color:var(--ink3);margin-top:2px;line-height:1.35}
  .divider{border:none;border-top:1px solid rgba(11,25,41,.1);margin:4px 0 20px}
  .cf-field{margin-bottom:12px}
  .cf-field label{display:block;font-size:.6875rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink3);margin-bottom:5px}
  .cf-field input,.cf-field textarea,.cf-field select{width:100%;padding:9px 11px;border:1.5px solid rgba(11,25,41,.12);border-radius:var(--r-md);font-family:'Inter',sans-serif;font-size:.8125rem;color:var(--ink)}
  .cf-field textarea{resize:vertical}
</style>
</head>
<body>
<div id="hp-sidebar"></div>

<main class="main">
  <div class="topbar">
    <div class="page-title">Enrichment</div>
    <div class="topbar-actions">
      <button class="btn btn-ghost" id="prioritize" title="Sort by HansePay fit score, highest first">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><line x1="3" y1="6" x2="13" y2="6"/><line x1="3" y1="12" x2="11" y2="12"/><line x1="3" y1="18" x2="9" y2="18"/><polyline points="17 8 17 18"/><polyline points="14 15 17 18 20 15"/></svg>
        Prioritize
      </button>
      <button class="btn btn-ghost" id="set-stage" title="Promote high-fit leads (score ≥70) to Qualified in the pipeline">Set stage from fit</button>
      <button class="btn btn-ghost" id="export-csv">Export CSV</button>
      <button class="btn btn-primary" id="run-analysis">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M12 3l1.9 5.1L19 10l-5.1 1.9L12 17l-1.9-5.1L5 10l5.1-1.9z"/></svg>
        Run analysis
      </button>
    </div>
  </div>

  <div class="content">
    <p class="muted" style="margin:-4px 0 18px;font-size:.875rem;max-width:760px">
      Define criteria columns, then run Claude across your customer list to fill them in — like Clay.
      Filter the list to scope a run, or tick individual rows. Results save to each customer and persist.
    </p>

    <!-- Criteria builder -->
    <div class="sec-label" style="margin-bottom:8px">Criteria columns</div>
    <div class="crit-bar" id="crit-bar"></div>

    <!-- Run controls -->
    <div class="run-bar">
      <label class="web-toggle"><input type="checkbox" id="web-toggle" checked> Use live web search</label>
      <span class="muted" id="web-status" style="font-size:.75rem">Checking…</span>
      <span style="flex:1"></span>
      <span class="run-status" id="run-status"></span>
    </div>

    <!-- Filters -->
    <div class="toolbar">
      <input class="search-input" id="search" type="text" placeholder="Filter rows — matches company, contact, country & analysis values…" />
      <select class="select" id="f-stage"><option value="">All stages</option><option value="lead">Lead</option><option value="qualified">Qualified</option><option value="proposal">Proposal</option><option value="won">Won</option><option value="lost">Lost</option></select>
      <select class="select" id="f-status"><option value="">All statuses</option><option value="prospect">Prospect</option><option value="active">Active</option><option value="churned">Churned</option></select>
      <select class="select" id="f-source"><option value="">All sources</option><option value="booking">Booking</option><option value="manual">Manual</option><option value="outbound">Outbound</option><option value="referral">Referral</option><option value="web">Web</option><option value="import">Import</option></select>
    </div>

    <!-- Table -->
    <div class="card" style="overflow:auto">
      <table class="data-table enrich-table">
        <thead><tr id="head-row"></tr></thead>
        <tbody id="rows"><tr><td class="empty">Loading…</td></tr></tbody>
      </table>
    </div>
  </div>
</main>

<!-- Add criterion modal -->
<div class="modal-ov" id="crit-modal" onclick="if(event.target===this)closeCritModal()">
  <div class="modal-card">
    <div class="modal-head">
      <div class="t">Add a criterion</div>
      <button class="modal-x" onclick="closeCritModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="sec-label">Common criteria</div>
      <div class="preset-grid" id="preset-grid"></div>

      <hr class="divider">
      <div class="sec-label">Or write your own</div>
      <div class="cf-field"><label>Column name</label><input id="cf-label" placeholder="e.g. Exports to Asia?"></div>
      <div class="cf-field"><label>Prompt for Claude</label><textarea id="cf-prompt" rows="3" placeholder="e.g. Does this company export goods to Asia? Answer based on what you can find."></textarea></div>
      <div class="cf-field"><label>Answer type</label>
        <select id="cf-type">
          <option value="text">Text / short phrase</option>
          <option value="boolean">Yes / No</option>
          <option value="number">Number</option>
          <option value="score">Score 1–5</option>
          <option value="score100">Score 0–100</option>
          <option value="category">Category (pick from a list)</option>
        </select>
      </div>
      <div class="cf-field" id="cf-options-wrap" style="display:none"><label>Allowed values (comma-separated)</label><input id="cf-options" placeholder="e.g. Small, Mid, Enterprise"></div>
      <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="addCustomCriterion()">Add criterion</button>
    </div>
  </div>
</div>

<script src="components.js"></script>
<script>
var H = window.HPAdmin;
H.renderSidebar('enrich');
var A = H.authFetch, esc = H.escapeHtml;

// ── State ──
var all = [];                 // customers matching dropdown filters
var columns = loadColumns();  // criteria column defs
var selected = {};            // id -> true (row checkboxes)
var running = {};             // id -> true (mid-analysis)
var webEnabled = true;
var sortKey = null, sortDir = 1;
var debounce;

var PRESETS = [
  { label:'HansePay fit (0–100)',   key:'fit_score',    type:'score100', prompt:'Score this company 0–100 as a HansePay cross-border-FX prospect, weighing cross-border/multi-currency need, likely FX volume, and reachability of a finance decision-maker. 100 = ideal.' },
  { label:'Fit reasoning',          key:'fit_reason',   type:'text',     prompt:'In one sentence, why does this company score the way it does as a HansePay FX prospect?' },
  { label:'Country',                key:'country_chk',  type:'text',     prompt:'In which country is this company headquartered?' },
  { label:'HQ city',                key:'hq_city',      type:'text',     prompt:'In which city is this company headquartered?' },
  { label:'Employee size band',     key:'emp_band',     type:'category', options:['1–10','11–50','51–200','201–1000','1000+'], prompt:'Estimate the number of employees and map it to one of the allowed bands.' },
  { label:'Industry category',      key:'industry_cat', type:'text',     prompt:'What is the primary industry or sector of this company?' },
  { label:'Annual revenue est.',    key:'revenue_est',  type:'text',     prompt:'Estimate the company’s approximate annual revenue in EUR (a range is fine).' },
  { label:'FX relevance (1–5)',key:'fx_relevance', type:'score',    prompt:'How strong a fit is this company for HansePay cross-border FX payments? 5 = strongest fit.' },
  { label:'Cross-border need',      key:'xborder_need', type:'boolean',  prompt:'Does this company likely have a cross-border or multi-currency payment need?' },
  { label:'Likely currency pairs',  key:'fx_pairs',     type:'text',     prompt:'Which currency pairs is this company most likely to trade (e.g. EUR/USD, EUR/CNY)?' },
  { label:'Decision-maker title',   key:'dm_title',     type:'text',     prompt:'Which job title should we target for FX payments outreach (e.g. CFO, Head of Treasury)?' },
  { label:'Recent growth signal',   key:'growth_signal',type:'text',     prompt:'Any recent funding, expansion, hiring or news that signals payment needs? Summarise briefly, or say None.' },
];

// ── Column persistence ──
function loadColumns(){
  try { var v = JSON.parse(localStorage.getItem('hp_enrich_columns')); return Array.isArray(v) ? v : []; }
  catch(e){ return []; }
}
function saveColumns(){ localStorage.setItem('hp_enrich_columns', JSON.stringify(columns)); }
function slug(s){ return String(s).toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'').slice(0,40) || 'col'; }
function hasColumn(key){ return columns.some(function(c){ return c.key===key; }); }

function addColumn(col){
  if(hasColumn(col.key)){ H.toast('That criterion is already added.'); return; }
  columns.push(col); saveColumns(); renderCrit(); render();
}
function removeColumn(key){
  columns = columns.filter(function(c){ return c.key!==key; }); saveColumns(); renderCrit(); render();
}

// ── Criteria chips ──
function renderCrit(){
  var bar = document.getElementById('crit-bar');
  var chips = columns.map(function(c){
    return '<span class="crit-chip"><span class="ct">'+esc(c.type)+'</span>'+esc(c.label)+
      '<button class="rm" title="Remove" onclick="removeColumn(\''+c.key+'\')">×</button></span>';
  }).join('');
  if(!columns.length) chips = '<span class="crit-empty">No criteria yet — add one to start.</span>';
  bar.innerHTML = chips + '<button class="crit-add" onclick="openCritModal()">+ Add criterion</button>';
}

// ── Add-criterion modal ──
function openCritModal(){
  var grid = document.getElementById('preset-grid');
  grid.innerHTML = PRESETS.map(function(p){
    var added = hasColumn(p.key);
    return '<button class="preset-btn" '+(added?'disabled':'')+' onclick=\'addPreset("'+p.key+'")\'>'+
      '<div class="pl">'+esc(p.label)+(added?' ✓':'')+'</div><div class="pp">'+esc(p.prompt)+'</div></button>';
  }).join('');
  document.getElementById('crit-modal').style.display='flex';
}
function closeCritModal(){ document.getElementById('crit-modal').style.display='none'; }
window.addPreset = function(key){
  var p = PRESETS.find(function(x){ return x.key===key; });
  if(p){ addColumn(Object.assign({}, p)); openCritModal(); } // refresh disabled state
};
document.getElementById('cf-type').addEventListener('change', function(){
  document.getElementById('cf-options-wrap').style.display = this.value==='category' ? 'block' : 'none';
});
window.addCustomCriterion = function(){
  var label  = document.getElementById('cf-label').value.trim();
  var prompt = document.getElementById('cf-prompt').value.trim();
  var type   = document.getElementById('cf-type').value;
  if(!label){ document.getElementById('cf-label').focus(); return; }
  if(!prompt){ document.getElementById('cf-prompt').focus(); return; }
  var key = slug(label); var base=key, n=2; while(hasColumn(key)){ key = base+'_'+(n++); }
  var col = { key:key, label:label, prompt:prompt, type:type };
  if(type==='category'){
    col.options = document.getElementById('cf-options').value.split(',').map(function(s){return s.trim();}).filter(Boolean);
    if(!col.options.length){ H.toast('Add at least one allowed value for a category.','error'); return; }
  }
  addColumn(col);
  document.getElementById('cf-label').value='';
  document.getElementById('cf-prompt').value='';
  document.getElementById('cf-options').value='';
  closeCritModal();
};

// ── Load + filter + render ──
function load(){
  var qs=[];
  ['stage','status','source'].forEach(function(f){
    var v=document.getElementById('f-'+f).value; if(v)qs.push(f+'='+v);
  });
  A('/api/customers'+(qs.length?'?'+qs.join('&'):'')).then(function(r){return r.json();}).then(function(list){
    all = Array.isArray(list)?list:[]; render(); updateRunStatus(); maybeAutorun();
  }).catch(function(){ document.getElementById('rows').innerHTML='<tr><td class="empty">Failed to load customers.</td></tr>'; });
}

function contactName(c){ return ((c.firstName||'')+' '+(c.lastName||'')).trim(); }

// Apply the client-side text filter (matches static fields + analysis values)
function viewList(){
  var q = document.getElementById('search').value.trim().toLowerCase();
  var list = all.slice();
  if(q){
    list = list.filter(function(c){
      var hay = [c.company, contactName(c), c.email, c.country, c.city, c.industry].filter(Boolean).join(' ').toLowerCase();
      var av = c.analysis ? Object.keys(c.analysis).map(function(k){return c.analysis[k];}).join(' ').toLowerCase() : '';
      return (hay+' '+av).indexOf(q) !== -1;
    });
  }
  if(sortKey){
    list.sort(function(a,b){
      var va = sortVal(a,sortKey), vb = sortVal(b,sortKey);
      if(va<vb) return -1*sortDir; if(va>vb) return 1*sortDir; return 0;
    });
  }
  return list;
}
function sortVal(c,key){
  var v;
  if(key==='company') v=c.company; else if(key==='contact') v=contactName(c);
  else v = c.analysis ? c.analysis[key] : undefined;
  if(v==null) return ''; if(typeof v==='number') return v;
  var n=parseFloat(v); return isNaN(n)?String(v).toLowerCase():(/^[\s\d.,%+–-]+$/.test(String(v))?n:String(v).toLowerCase());
}

function srcBadge(c){
  var s = c.analysisSources;
  if(!s || !s.length) return '';
  var title = 'Researched from:\n' + s.join('\n');
  return ' <span title="'+esc(title)+'" style="display:inline-flex;align-items:center;gap:3px;font-size:.625rem;font-weight:600;color:var(--n400);vertical-align:middle;cursor:help">'+
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" width="11" height="11"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>'+s.length+'</span>';
}
// small confidence dot from c.analysisConf[key]
function confDot(c,key){
  var lv = c.analysisConf ? c.analysisConf[key] : null;
  if(!lv) return '';
  var color = lv==='high' ? 'var(--ok)' : (lv==='medium' ? 'var(--warn)' : 'var(--ink3)');
  return '<span title="Confidence: '+lv+'" style="display:inline-block;width:7px;height:7px;border-radius:50%;background:'+color+';margin-right:6px;vertical-align:middle;flex-shrink:0"></span>';
}
function score100Color(n){
  if(n>=70) return ['var(--okbg)','var(--ok)'];
  if(n>=40) return ['var(--warnbg)','var(--warn)'];
  return ['var(--badbg)','var(--bad)'];
}
function cellVal(c,col){
  if(running[c.id]) return '<span class="enrich-dots">•••</span>';
  var v = c.analysis ? c.analysis[col.key] : undefined;
  if(v===undefined||v===null||v==='') return '<span class="muted">—</span>';
  var s = esc(String(v));
  var dot = confDot(c,col.key);
  if(col.type==='boolean'){
    var yes = /^y|^t|true/i.test(String(v));
    return dot+'<span class="badge" style="background:'+(yes?'var(--okbg)':'var(--badbg)')+';color:'+(yes?'var(--ok)':'var(--bad)')+'">'+s+'</span>';
  }
  if(col.type==='score100'){
    var n=parseInt(v,10); if(isNaN(n)) return dot+s;
    var col2=score100Color(n);
    return dot+'<span class="badge" style="background:'+col2[0]+';color:'+col2[1]+';font-weight:700;font-variant-numeric:tabular-nums">'+n+'</span>';
  }
  if(col.type==='score') return dot+'<span class="badge" style="background:var(--n050);color:var(--n500);font-variant-numeric:tabular-nums">'+s+'</span>';
  return dot+s;
}

function sortArrow(key){ return sortKey===key ? '<span class="arrow">'+(sortDir>0?'▲':'▼')+'</span>' : ''; }

function renderHead(){
  var h = '<th class="sel-col"><input type="checkbox" class="row-check" id="check-all" title="Select all"></th>'+
    '<th class="sortable" onclick="setSort(\'company\')"><span class="col-head">Company '+sortArrow('company')+'</span></th>'+
    '<th class="sortable" onclick="setSort(\'contact\')"><span class="col-head">Contact '+sortArrow('contact')+'</span></th>';
  h += columns.map(function(col){
    return '<th class="sortable" onclick="setSort(\''+col.key+'\')"><span class="col-head">'+esc(col.label)+' '+sortArrow(col.key)+'</span></th>';
  }).join('');
  document.getElementById('head-row').innerHTML = h;
  var ca = document.getElementById('check-all');
  if(ca){ ca.addEventListener('change', function(){ toggleAll(this.checked); }); }
}

function render(){
  renderCrit();
  renderHead();
  var tb = document.getElementById('rows');
  var list = viewList();
  var colCount = 3 + columns.length;
  if(!list.length){ tb.innerHTML='<tr><td colspan="'+colCount+'" class="empty">No customers match.</td></tr>'; return; }
  tb.innerHTML = list.map(function(c){
    var cells = '<td class="sel-col"><input type="checkbox" class="row-check" '+(selected[c.id]?'checked':'')+' onclick="toggleRow(\''+c.id+'\',this.checked)"></td>'+
      '<td class="t-strong">'+esc(c.company||'—')+srcBadge(c)+'<div class="muted" style="font-weight:400;font-size:.6875rem">'+esc(c.industry||'')+(c.country?' · '+esc(c.country):'')+'</div></td>'+
      '<td>'+esc(contactName(c)||'—')+'<div class="muted" style="font-size:.6875rem">'+esc(c.email||'')+'</div></td>';
    cells += columns.map(function(col){ return '<td>'+cellVal(c,col)+'</td>'; }).join('');
    return '<tr>'+cells+'</tr>';
  }).join('');
}

window.setSort = function(key){ if(sortKey===key){ sortDir=-sortDir; } else { sortKey=key; sortDir=1; } render(); };
window.toggleRow = function(id,on){ if(on) selected[id]=true; else delete selected[id]; updateRunStatus(); };
function toggleAll(on){ viewList().forEach(function(c){ if(on) selected[c.id]=true; else delete selected[c.id]; }); render(); updateRunStatus(); }

function selectedIds(){ return Object.keys(selected); }
function updateRunStatus(extra){
  var n = selectedIds().length;
  var base = n ? (n+' selected') : (viewList().length+' rows (all shown)');
  document.getElementById('run-status').textContent = extra ? extra : base;
}

// ── Run analysis ──
function runAnalysis(skipConfirm){
  if(!columns.length){ H.toast('Add at least one criterion first.','error'); openCritModal(); return; }
  var view = viewList();
  var ids = selectedIds().filter(function(id){ return view.some(function(c){return c.id===id;}); });
  var targets = ids.length ? view.filter(function(c){ return selected[c.id]; }) : view;
  if(!targets.length){ H.toast('No rows to analyse.','error'); return; }
  if(skipConfirm!==true && !confirm('Run analysis on '+targets.length+' '+(targets.length===1?'company':'companies')+' across '+columns.length+' '+(columns.length===1?'criterion':'criteria')+'?\n\nThis uses Claude API credits'+(webEnabled?' and live web search':'')+'.')) return;

  var btn = document.getElementById('run-analysis');
  btn.disabled = true;
  var queue = targets.slice(), total = queue.length, done = 0, active = 0, failed = 0;

  function finish(){
    btn.disabled = false;
    updateRunStatus('Done — analysed '+(total-failed)+' / '+total+(failed?(' ('+failed+' failed)'):''));
    H.toast('Analysis complete ✓');
  }
  function next(){
    if(!queue.length){ if(active===0) finish(); return; }
    var c = queue.shift(); active++; running[c.id] = true; render();
    A('/api/customers/'+c.id+'/analyze',{ method:'POST', body: JSON.stringify({ columns: columns, web: webEnabled }) })
      .then(function(r){ return r.json(); })
      .then(function(d){
        if(d && d.values){ c.analysis = Object.assign({}, c.analysis, d.values); if(d.confidence) c.analysisConf = Object.assign({}, c.analysisConf, d.confidence); if(d.sources && d.sources.length) c.analysisSources = d.sources; }
        else { failed++; if(d && d.error && failed===1) H.toast(d.error,'error'); }
      })
      .catch(function(){ failed++; })
      .finally(function(){
        delete running[c.id]; active--; done++;
        updateRunStatus('Analysing '+done+' / '+total+'…');
        render(); next();
      });
  }
  var conc = Math.min(3, queue.length);
  updateRunStatus('Analysing 0 / '+total+'…');
  for(var i=0;i<conc;i++) next();
}

// ── Export CSV (client-side, includes dynamic columns) ──
function exportCsv(){
  var list = viewList();
  var headers = ['Company','Contact','Email','Country'].concat(columns.map(function(c){return c.label;}));
  var rows = list.map(function(c){
    var base = [c.company||'', contactName(c), c.email||'', c.country||''];
    var dyn = columns.map(function(col){ var v=c.analysis?c.analysis[col.key]:''; return v==null?'':String(v); });
    return base.concat(dyn);
  });
  var csv = [headers].concat(rows).map(function(r){
    return r.map(function(cell){ var s=String(cell); return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; }).join(',');
  }).join('\n');
  var blob = new Blob([csv],{type:'text/csv;charset=utf-8'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = 'hansepay-enrichment.csv';
  document.body.appendChild(a); a.click(); a.remove();
}

// ── Web search availability ──
A('/api/health').then(function(r){return r.json();}).then(function(h){
  var ws = document.getElementById('web-status'), tg = document.getElementById('web-toggle');
  if(h && h.webSearchConfigured){ ws.textContent = 'Live web search available'; }
  else { ws.textContent = 'Web search not configured — uses Claude knowledge only'; tg.checked = false; tg.disabled = true; webEnabled = false; }
}).catch(function(){});

// ── Prioritize: sort by fit score, highest first ──
function prioritize(){
  if(!columns.some(function(c){return c.key==='fit_score';})){
    H.toast('Add the “HansePay fit (0–100)” column first, then run analysis.','error'); return;
  }
  sortKey='fit_score'; sortDir=-1; render();
  H.toast('Sorted by HansePay fit ↓');
}

// ── Write-back: promote high-fit leads to Qualified ──
function setStageFromFit(){
  if(!columns.some(function(c){return c.key==='fit_score';})){
    H.toast('Add and run the fit-score column first.','error'); return;
  }
  var targets = all.filter(function(c){
    var f = c.analysis ? parseInt(c.analysis.fit_score,10) : NaN;
    return !isNaN(f) && f>=70 && c.stage==='lead';
  });
  if(!targets.length){ H.toast('No leads with fit ≥70 to promote.'); return; }
  if(!confirm('Promote '+targets.length+' lead'+(targets.length===1?'':'s')+' with HansePay fit ≥70 to “Qualified” in the pipeline?\n\nThis updates the customer records and never downgrades.')) return;
  var done=0;
  Promise.all(targets.map(function(c){
    return A('/api/customers/'+c.id,{method:'PUT',body:JSON.stringify({stage:'qualified'})})
      .then(function(r){ if(r.ok){ c.stage='qualified'; done++; } }).catch(function(){});
  })).then(function(){ render(); H.toast('Promoted '+done+' to Qualified ✓'); });
}

// ── Auto-enrich handoff from CSV import ──
var DEFAULT_RECIPE_KEYS = ['fit_score','country_chk','emp_band','xborder_need','dm_title'];
function maybeAutorun(){
  var raw; try { raw = JSON.parse(localStorage.getItem('hp_enrich_autorun')||'null'); } catch(e){ raw=null; }
  if(!raw || !raw.ids || !raw.ids.length) return;
  localStorage.removeItem('hp_enrich_autorun');           // run once
  if(Date.now() - (raw.ts||0) > 600000) return;           // stale (>10 min)
  // Ensure default recipe columns exist (merge, don't duplicate)
  DEFAULT_RECIPE_KEYS.forEach(function(k){
    if(hasColumn(k)) return;
    var p = PRESETS.find(function(x){ return x.key===k; });
    if(p) columns.push(Object.assign({}, p));
  });
  saveColumns(); renderCrit();
  // Select the imported rows that are present in the loaded list
  selected = {};
  var present = 0;
  raw.ids.forEach(function(id){ if(all.some(function(c){return c.id===id;})){ selected[id]=true; present++; } });
  render(); updateRunStatus();
  if(!present){ H.toast('Imported leads not found to enrich.','error'); return; }
  H.toast('Auto-enriching '+present+' imported lead'+(present===1?'':'s')+'…');
  setTimeout(function(){ runAnalysis(true); }, 400);
}

// ── Wire up ──
document.getElementById('web-toggle').addEventListener('change', function(){ webEnabled = this.checked; });
document.getElementById('run-analysis').addEventListener('click', function(){ runAnalysis(); });
document.getElementById('prioritize').addEventListener('click', prioritize);
document.getElementById('set-stage').addEventListener('click', setStageFromFit);
document.getElementById('export-csv').addEventListener('click', exportCsv);
document.getElementById('search').addEventListener('input', function(){ clearTimeout(debounce); debounce=setTimeout(function(){ render(); updateRunStatus(); },180); });
['f-stage','f-status','f-source'].forEach(function(id){ document.getElementById(id).addEventListener('change', function(){ selected={}; load(); }); });

renderCrit();
load();
updateRunStatus();
</script>
