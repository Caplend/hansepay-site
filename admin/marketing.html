<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Marketing — HansePay Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="admin.css" />
</head>
<body>
<div id="hp-sidebar"></div>

<main class="main">
  <div class="topbar">
    <div class="page-title">Marketing</div>
    <div class="topbar-actions">
      <a class="btn btn-ghost" href="/hansepay/admin/seo.html">SEO Manager</a>
      <a class="btn btn-ghost" href="/hansepay/admin/analytics.html">Full analytics</a>
    </div>
  </div>

  <div class="content">
    <!-- KPIs -->
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-value" id="m-views">—</div><div class="stat-label">Total pageviews</div></div>
      <div class="stat-card"><div class="stat-value" id="m-leads">—</div><div class="stat-label">Leads captured</div></div>
      <div class="stat-card"><div class="stat-value" id="m-bookings">—</div><div class="stat-label">Calls booked</div></div>
      <div class="stat-card"><div class="stat-value" id="m-conv">—</div><div class="stat-label">View → call rate</div></div>
    </div>

    <!-- Traffic chart -->
    <div class="card card-pad" style="margin-bottom:24px">
      <div class="card-title">Traffic — last 30 days</div>
      <canvas id="traffic-chart" height="80"></canvas>
    </div>

    <div class="section-grid" style="grid-template-columns:1fr 1fr;margin-bottom:24px">
      <!-- Channels -->
      <div class="card card-pad">
        <div class="card-title">Traffic by channel</div>
        <div class="bars" id="channels"><div class="muted">Loading…</div></div>
      </div>
      <!-- Funnel -->
      <div class="card card-pad">
        <div class="card-title">Conversion funnel</div>
        <div id="funnel"></div>
      </div>
    </div>

    <div class="section-grid" style="grid-template-columns:1fr 1fr;margin-bottom:24px">
      <!-- Lead sources -->
      <div class="card card-pad">
        <div class="card-title">Leads by source</div>
        <canvas id="source-chart" height="150"></canvas>
      </div>
      <!-- SEO coverage -->
      <div class="card card-pad">
        <div class="card-title">SEO coverage <span id="seo-score" class="chip" style="float:right"></span></div>
        <div id="seo-coverage"></div>
      </div>
    </div>

    <div class="section-grid" style="grid-template-columns:1fr 1fr">
      <!-- Top pages -->
      <div class="card" style="overflow:hidden">
        <div class="card-pad" style="padding-bottom:8px"><div class="card-title" style="margin:0">Top pages</div></div>
        <table class="data-table"><thead><tr><th>Page</th><th style="text-align:right">Views</th></tr></thead>
          <tbody id="top-pages"><tr><td colspan="2" class="empty">Loading…</td></tr></tbody></table>
      </div>
      <!-- Top content -->
      <div class="card" style="overflow:hidden">
        <div class="card-pad" style="padding-bottom:8px"><div class="card-title" style="margin:0">Top content</div></div>
        <table class="data-table"><thead><tr><th>Article</th><th>Category</th><th style="text-align:right">Views</th></tr></thead>
          <tbody id="top-content"><tr><td colspan="3" class="empty">Loading…</td></tr></tbody></table>
      </div>
    </div>
  </div>
</main>

<script src="components.js"></script>
<script>
var H=window.HPAdmin; H.renderSidebar('marketing');
var A=H.authFetch, esc=H.escapeHtml;
var CH_COLORS={direct:'#1E4E80',organic:'#16a34a',social:'#2E6BAD',referral:'#C9A961',email:'#6d28d9'};

A('/api/marketing/summary').then(function(r){return r.json();}).then(function(s){
  var t=s.totals;
  document.getElementById('m-views').textContent=H.num(t.totalViews);
  document.getElementById('m-leads').textContent=H.num(t.leads);
  document.getElementById('m-bookings').textContent=H.num(t.bookings);
  document.getElementById('m-conv').textContent=t.conversionRate+'%';

  // Traffic
  var days=s.viewsLast30Days||[];
  new Chart(document.getElementById('traffic-chart').getContext('2d'),{type:'line',
    data:{labels:days.map(function(d){return new Date(d.date).toLocaleDateString('en-GB',{month:'short',day:'numeric'});}),
      datasets:[{data:days.map(function(d){return d.count;}),borderColor:'#2E6BAD',backgroundColor:'rgba(46,107,173,.08)',borderWidth:2,fill:true,tension:.4,pointRadius:2}]},
    options:{plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{maxTicksLimit:10,font:{size:11}}},y:{beginAtZero:true,ticks:{font:{size:11}}}}}});

  // Channels
  var ch=s.channels||{}; var total=Object.values(ch).reduce(function(a,b){return a+b;},0)||1;
  var chEl=document.getElementById('channels');
  var entries=Object.entries(ch).sort(function(a,b){return b[1]-a[1];});
  chEl.innerHTML=entries.length?entries.map(function(e){
    var pct=Math.round(e[1]/total*100);
    return '<div class="bar-row"><span class="bar-label">'+esc(e[0])+'</span>'+
      '<span class="bar-track"><span class="bar-fill" style="width:'+pct+'%;background:'+(CH_COLORS[e[0]]||'#2E6BAD')+'"></span></span>'+
      '<span class="bar-val">'+pct+'%</span></div>';
  }).join(''):'<div class="muted" style="font-size:.8125rem">No traffic data yet. Pageviews populate as visitors arrive.</div>';

  // Funnel
  var f=s.funnel;
  var steps=[['Pageviews',f.views],['Opened booking',f.modalOpens],['Calls booked',f.bookings]];
  var max=Math.max(f.views,1);
  document.getElementById('funnel').innerHTML=steps.map(function(st,i){
    var w=Math.max(6,Math.round(st[1]/max*100));
    var conv=i>0&&steps[i-1][1]?Math.round(st[1]/steps[i-1][1]*100)+'%':'';
    return '<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:.8125rem;margin-bottom:4px"><span class="bar-label">'+st[0]+'</span><span class="t-strong">'+H.num(st[1])+(conv?' <span class="muted">('+conv+')</span>':'')+'</span></div>'+
      '<div class="bar-track" style="height:14px"><span class="bar-fill" style="width:'+w+'%;background:linear-gradient(90deg,#1E4E80,#2E6BAD)"></span></div></div>';
  }).join('');

  // Lead sources
  var ls=s.leadsBySource||{};
  new Chart(document.getElementById('source-chart').getContext('2d'),{type:'doughnut',
    data:{labels:Object.keys(ls),datasets:[{data:Object.values(ls),backgroundColor:['#1E4E80','#2E6BAD','#C9A961','#16a34a','#6d28d9','#8DBDE6'],borderWidth:0}]},
    options:{cutout:'60%',plugins:{legend:{position:'right',labels:{font:{family:'Inter',size:12},color:'#3D5A73',padding:12,usePointStyle:true}}}}});

  // SEO coverage
  document.getElementById('seo-score').textContent=t.seoComplete+'/'+t.seoTotal+' complete';
  document.getElementById('seo-coverage').innerHTML=(s.seoCoverage||[]).map(function(p){
    function mk(ok){return ok?'<span style="color:#16a34a">✓</span>':'<span style="color:#dc2626">✗</span>';}
    return '<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(11,25,41,.05);font-size:.8125rem">'+
      '<span class="t-strong">'+esc(p.slug)+'</span>'+
      '<span style="display:flex;gap:18px"><span>Title '+mk(p.hasTitle)+'</span><span>Desc '+mk(p.hasDesc)+'</span></span></div>';
  }).join('');

  // Top pages
  document.getElementById('top-pages').innerHTML=(s.topPages.length?s.topPages.map(function(p){
    return '<tr><td class="t-strong">'+esc(p.page)+'</td><td style="text-align:right">'+H.num(p.views)+'</td></tr>';
  }).join(''):'<tr><td colspan="2" class="empty">No data yet.</td></tr>');

  // Top content
  document.getElementById('top-content').innerHTML=(s.topPosts.length?s.topPosts.map(function(p){
    return '<tr><td class="t-strong" style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(p.title)+'</td><td><span class="badge badge-soft">'+esc(p.category||'—')+'</span></td><td style="text-align:right">'+H.num(p.views)+'</td></tr>';
  }).join(''):'<tr><td colspan="3" class="empty">No published posts yet.</td></tr>');
}).catch(function(){});
</script>
</body>
</html>
